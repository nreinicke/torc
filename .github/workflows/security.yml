name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Run weekly to catch newly published advisories
  schedule:
    - cron: '0 6 * * 1'

jobs:
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: --config deny.toml
