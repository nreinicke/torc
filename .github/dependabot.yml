version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-patch-updates:
        update-types:
          - patch
      rust-minor-updates:
        update-types:
          - minor
    # Major version bumps get individual PRs (they often have breaking changes)
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
