components:
  schemas:
    AccessCheckResponse:
      type: object
      required:
      - has_access
      - user_name
      - workflow_id
      properties:
        has_access:
          type: boolean
        reason:
          type:
          - string
          - 'null'
        user_name:
          type: string
        workflow_id:
          type: integer
          format: int64
    AccessGroupModel:
      type: object
      required:
      - name
      properties:
        created_at:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        id:
          type:
          - integer
          - 'null'
          format: int64
        name:
          type: string
    ActiveTaskResponse:
      type: object
      description: |-
        Wrapper for `GET /workflows/{id}/active_task` so the response always has a JSON body,
        even when the workflow currently has no active async task. The `task` field is the
        active task for this workflow, or null if none is in-flight.
      properties:
        task:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TaskModel'
    BatchCompleteJobsRequest:
      type: object
      required:
      - completions
      properties:
        completions:
          type: array
          items:
            $ref: '#/components/schemas/JobCompletionEntry'
    BatchCompleteJobsResponse:
      type: object
      required:
      - completed
      - errors
      properties:
        completed:
          type: array
          items:
            type: integer
            format: int64
        errors:
          type: array
          items:
            $ref: '#/components/schemas/JobCompletionError'
    ClaimActionRequest:
      type: object
      properties:
        compute_node_id:
          type:
          - integer
          - 'null'
          format: int64
    ClaimActionResponse:
      type: object
      required:
      - action_id
      properties:
        action_id:
          type: integer
          format: int64
        success:
          type: boolean
          default: false
    ClaimJobsBasedOnResources:
      type: object
      properties:
        jobs:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/JobModel'
        reason:
          type:
          - string
          - 'null'
    ClaimNextJobsResponse:
      type: object
      properties:
        jobs:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/JobModel'
    ComputeNodeModel:
      type: object
      required:
      - workflow_id
      - hostname
      - pid
      - start_time
      - num_cpus
      - memory_gb
      - num_gpus
      - num_nodes
      - compute_node_type
      properties:
        avg_cpu_percent:
          type:
          - number
          - 'null'
          format: double
        avg_memory_bytes:
          type:
          - integer
          - 'null'
          format: int64
        compute_node_type:
          type: string
        duration_seconds:
          type:
          - number
          - 'null'
          format: double
        hostname:
          type: string
        id:
          type:
          - integer
          - 'null'
          format: int64
        is_active:
          type:
          - boolean
          - 'null'
        memory_gb:
          type: number
          format: double
        num_cpus:
          type: integer
          format: int64
        num_gpus:
          type: integer
          format: int64
        num_nodes:
          type: integer
          format: int64
        peak_cpu_percent:
          type:
          - number
          - 'null'
          format: double
        peak_memory_bytes:
          type:
          - integer
          - 'null'
          format: int64
        pid:
          type: integer
          format: int64
        sample_count:
          type:
          - integer
          - 'null'
          format: int64
        scheduler: {}
        scheduler_config_id:
          type:
          - integer
          - 'null'
          format: int64
        start_time:
          type: string
        time_limit:
          type:
          - string
          - 'null'
        workflow_id:
          type: integer
          format: int64
    ComputeNodeSchedule:
      type: object
      required:
      - num_jobs
      - scheduler_id
      properties:
        max_parallel_jobs:
          type:
          - integer
          - 'null'
          format: int64
        num_jobs:
          type: integer
          format: int64
        scheduler_id:
          type: integer
          format: int64
        start_one_worker_per_node:
          type:
          - boolean
          - 'null'
    ComputeNodesResources:
      type: object
      required:
      - num_cpus
      - memory_gb
      - num_gpus
      - num_nodes
      properties:
        id:
          type:
          - integer
          - 'null'
          format: int64
        memory_gb:
          type: number
          format: double
        num_cpus:
          type: integer
          format: int64
        num_gpus:
          type: integer
          format: int64
        num_nodes:
          type: integer
          format: int64
        scheduler_config_id:
          type:
          - integer
          - 'null'
          format: int64
        time_limit:
          type:
          - string
          - 'null'
    CreateJobsResponse:
      type: object
      properties:
        jobs:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/JobModel'
    DeleteCountResponse:
