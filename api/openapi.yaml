          type:
          - integer
          - 'null'
          format: int64
        error: {}
        errorMessage:
          type:
          - string
          - 'null'
        errorNum:
          type:
          - integer
          - 'null'
          format: int64
    EventModel:
      type: object
      required:
      - workflow_id
      - timestamp
      - data
      properties:
        data: {}
        id:
          type:
          - integer
          - 'null'
          format: int64
        timestamp:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
    FailureHandlerModel:
      type: object
      required:
      - workflow_id
