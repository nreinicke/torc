      properties:
        id:
          type:
          - integer
          - 'null'
          format: int64
        name:
          type: string
        rules:
          type: string
        workflow_id:
          type: integer
          format: int64
    FileModel:
      type: object
      required:
      - workflow_id
      - name
      - path
      properties:
        id:
          type:
          - integer
          - 'null'
          format: int64
        name:
          type: string
        path:
          type: string
        st_mtime:
          type:
          - number
          - 'null'
          format: double
        workflow_id:
          type: integer
          format: int64
    GetReadyJobRequirementsResponse:
      type: object
