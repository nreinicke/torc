      - job_id
      - status
      - run_id
      - result
      properties:
        job_id:
          type: integer
          format: int64
        result:
          $ref: '#/components/schemas/ResultModel'
        run_id:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/JobStatus'
    JobCompletionError:
      type: object
      required:
      - job_id
      - message
      properties:
        job_id:
          type: integer
          format: int64
        message:
          type: string
    JobDependencyModel:
      type: object
      required:
      - job_id
      - job_name
      - depends_on_job_id
      - depends_on_job_name
      - workflow_id
      properties:
        depends_on_job_id:
          type: integer
          format: int64
        depends_on_job_name:
          type: string
        job_id:
          type: integer
          format: int64
        job_name:
          type: string
        workflow_id:
          type: integer
          format: int64
    JobFileRelationshipModel:
      type: object
      required:
      - file_id
      - file_name
      - file_path
      - workflow_id
      properties:
        consumer_job_id:
          type:
          - integer
          - 'null'
          format: int64
        consumer_job_name:
          type:
          - string
          - 'null'
        file_id:
          type: integer
          format: int64
        file_name:
          type: string
        file_path:
          type: string
        producer_job_id:
          type:
          - integer
          - 'null'
          format: int64
        producer_job_name:
          type:
          - string
          - 'null'
        workflow_id:
          type: integer
          format: int64
    JobModel:
      type: object
      required:
      - workflow_id
      - name
      - command
      properties:
        attempt_id:
          type:
          - integer
          - 'null'
          format: int64
        cancel_on_blocking_job_failure:
          type:
          - boolean
          - 'null'
        command:
          type: string
        depends_on_job_ids:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int64
        env:
          type:
          - object
          - 'null'
          additionalProperties:
            type: string
          propertyNames:
            type: string
            pattern: ^[A-Za-z_][A-Za-z0-9_]*$
        failure_handler_id:
          type:
          - integer
          - 'null'
          format: int64
        id:
          type:
          - integer
          - 'null'
          format: int64
        input_file_ids:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int64
        input_user_data_ids:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int64
        invocation_script:
          type:
          - string
          - 'null'
        name:
          type: string
        output_file_ids:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int64
        output_user_data_ids:
          type:
          - array
          - 'null'
          items:
            type: integer
            format: int64
        priority:
          type:
          - integer
          - 'null'
          format: int64
          description: Scheduling priority; higher values are submitted first. Minimum 0, default 0.
          default: 0
          minimum: 0
        resource_requirements_id:
          type:
          - integer
          - 'null'
          format: int64
        schedule_compute_nodes:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ComputeNodeSchedule'
        scheduler_id:
          type:
          - integer
          - 'null'
          format: int64
        status:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobStatus'
        supports_termination:
          type:
          - boolean
          - 'null'
        workflow_id:
          type: integer
          format: int64
    JobStatus:
      type: string
      enum:
      - uninitialized
      - blocked
      - ready
      - pending
      - running
      - completed
      - failed
      - canceled
      - terminated
      - disabled
      - pending_failed
    JobUserDataRelationshipModel:
      type: object
      required:
      - user_data_id
      - user_data_name
      - workflow_id
      properties:
        consumer_job_id:
          type:
          - integer
          - 'null'
          format: int64
        consumer_job_name:
          type:
          - string
          - 'null'
        producer_job_id:
          type:
          - integer
          - 'null'
          format: int64
        producer_job_name:
