          type: integer
          format: int64
        max_runtime:
          type: string
        memory_gb:
          type: number
          format: double
        num_cpus:
          type: integer
          format: int64
        num_gpus:
          type: integer
          format: int64
        num_jobs:
          type: integer
          format: int64
    IsCompleteResponse:
