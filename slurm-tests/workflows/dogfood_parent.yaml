name: slurm_tests_dogfood
description: Parent Torc workflow that orchestrates the Slurm integration suite
project: slurm-tests
execution_config:
  mode: direct

resource_requirements:
  - name: parent_resources
    num_cpus: 1
    num_gpus: 0
    num_nodes: 1
    memory: 1g
    runtime: PT10M

jobs:
  - name: single_node_basic
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      single_node_basic PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: no_srun_basic
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      no_srun_basic PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: cancel_workflow
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      cancel_workflow PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: multi_node_parallel
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      multi_node_parallel PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: multi_node_mpi_step
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      multi_node_mpi_step PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: job_parallelism
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      job_parallelism PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: oom_detection
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      oom_detection PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: watch_recover_oom
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      watch_recover_oom PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: resource_monitoring
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      resource_monitoring PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: failure_recovery
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      failure_recovery PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: timeout_detection
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      timeout_detection PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: srun_termination_signal
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      srun_termination_signal PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION

  - name: sync_status
    resource_requirements: parent_resources
    command: >-
      bash slurm-tests/scripts/run_child_test.sh
      sync_status PLACEHOLDER_ACCOUNT PLACEHOLDER_PARTITION
