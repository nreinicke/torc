# Test 2: Multi-Node Parallel
#
# 2-node allocation with start_one_worker_per_node=true, 6 parallel independent jobs.
# Verifies jobs dispatch to 2 nodes, concurrent execution, sstat/sacct capture.
# Adapted from tests/workflows/multi_node_parallel_jobs_test/

name: multi_node_parallel
description: 2-node allocation with one worker per node — parallel single-node jobs
project: slurm-tests

resource_monitor:
  enabled: true
  granularity: time_series
  sample_interval_seconds: 2

resource_requirements:
  - name: work_resources
    num_cpus: 2
    num_nodes: 1
    memory: 2g
    runtime: PT10M

jobs:
  - name: work_{i}
    command: bash slurm-tests/scripts/work.sh {i}
    resource_requirements: work_resources
    scheduler: two_node_scheduler
    parameters:
      i: 1:6

slurm_schedulers:
  - name: two_node_scheduler
    account: PLACEHOLDER_ACCOUNT
    partition: PLACEHOLDER_PARTITION
    nodes: 2
    walltime: "00:30:00"

actions:
  - trigger_type: "on_workflow_start"
    action_type: "schedule_nodes"
    scheduler: "two_node_scheduler"
    scheduler_type: "slurm"
    num_allocations: 1
    start_one_worker_per_node: true
