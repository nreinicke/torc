# Test: Workflow Cancellation
#
# 1-node allocation with 3 independent long-running sleep jobs.
# The test framework cancels the workflow while jobs are running
# and verifies that Slurm allocations are canceled and no jobs remain running.

name: cancel_workflow
description: Workflow cancellation test — cancel while jobs are running
project: slurm-tests
execution_config:
  mode: slurm

resource_requirements:
  - name: sleep_resources
    num_cpus: 1
    num_nodes: 1
    memory: 512m
    runtime: PT5M

jobs:
  - name: sleep_job_1
    command: |
      echo "Sleep job 1 on $(hostname)"
      sleep 1800
    resource_requirements: sleep_resources

  - name: sleep_job_2
    command: |
      echo "Sleep job 2 on $(hostname)"
      sleep 1800
    resource_requirements: sleep_resources

  - name: sleep_job_3
    command: |
      echo "Sleep job 3 on $(hostname)"
      sleep 1800
    resource_requirements: sleep_resources

slurm_schedulers:
  - name: cancel_scheduler
    account: PLACEHOLDER_ACCOUNT
    partition: PLACEHOLDER_PARTITION
    nodes: 1
    walltime: "00:15:00"

actions:
  - trigger_type: "on_workflow_start"
    action_type: "schedule_nodes"
    scheduler: "cancel_scheduler"
    scheduler_type: "slurm"
    num_allocations: 1
