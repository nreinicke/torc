name: "Pipeline Perf Test (3K Jobs)"
description: |
  Stress-test the runner-server interaction hot path with a three-stage
  pipeline:

    setup_{i}    (CPU)  ──▶  work_{i}    (CPU)  ──▶  post_{i}    (CPU)
                                                     │
                                                     ▼
                                                final_aggregate

  - 1,000 setup jobs (CPU only) each produce one input file.
  - 1,000 middle-stage jobs each consume the matching setup file, run on
    1 CPU, and emit a result file. These jobs delete their input file on the way
    through.
  - 1,000 postprocess jobs (1 CPU each) each consume one middle-stage output and
    emit a tiny result stub. Postprocess jobs delete their input on
    the way through.
  - 1 final_aggregate job fans in over all postprocess outputs.

  Total: 3,001 jobs, 3,000 file dependencies plus a regex fan-in.

  ## Designed scheduling shape

  Priorities (higher = claimed first):
    - work_*          : 100  (always preferred when mid-stage work is ready)
    - post_*          :  50  (drains finished mid-stage outputs as fast as possible)
    - setup_*         :   1  (only fills CPUs that have no postprocess work)
    - final_aggregate :   0

  In steady state this produces roughly:
    setup files created and consumed continuously by mid-stage jobs,
    mid-stage jobs running flat-out limited by CPU count,
    postprocess jobs filling whatever CPU capacity isn't taken by setups.

  The only files that accumulate end-to-end are the postprocess output stubs,
  which the final aggregator consumes in one pass.

  ## What this exercises

  Compared to running on `main`, this workflow specifically stresses the
  runner-server hot path that recent perf changes target:

  1. Empty-poll cost while runners with free CPU capacity wait for upstream
     jobs to finish.
  2. Per-iteration sleep gap between short jobs completing and the next
     batch being claimed.
  3. Per-job round-trip cost for completion reporting at high throughput
     (batch_complete_jobs).

  ## Running

  Build and start the server:

      cargo build --release --features server-bin --bin torc-server
      ./target/release/torc-server run

  Submit the workflow (creates jobs and triggers the on_workflow_start action
  so Slurm allocates the node block):

      torc submit tests/workflows/pipeline_perf_test/workflow.yaml

  Or create now and submit later:

      torc create tests/workflows/pipeline_perf_test/workflow.yaml
      torc submit <workflow_id>

  Replace the `account` field below with your Slurm account before running.
  Adjust the `partition` if your site uses a different CPU debug queue.

slurm_schedulers:
  - name: "debug_cpu"
    account: "PLACEHOLDER_ACCOUNT"
    partition: "debug"
    nodes: 2
    walltime: "08:00:00"

resource_requirements:
  - name: "cpu_small"
    num_cpus: 1
    num_nodes: 1
    memory: "256m"
    runtime: "PT1M"

files:
  - name: "setup_out_{i:04d}"
    path: "output/setup/setup_out_{i:04d}.txt"
    parameters:
      i: "0:999"

  - name: "work_out_{i:04d}"
    path: "output/work/work_out_{i:04d}.txt"
    parameters:
      i: "0:999"

  - name: "post_out_{i:04d}"
    path: "output/post/post_out_{i:04d}.txt"
    parameters:
      i: "0:999"

  - name: "final_report"
    path: "output/final_report.txt"

jobs:
  # 1k setup jobs — CPU only, lowest priority. Each emits one file.
  - name: "setup_{i:04d}"
    command: |
      mkdir -p output/setup
      printf 'setup-%s\n' "{i}" > output/setup/setup_out_{i:04d}.txt
    priority: 1
    resource_requirements: "cpu_small"
    scheduler: "debug_cpu"
    output_files: ["setup_out_{i:04d}"]
    parameters:
      i: "0:999"

  # 1k mid-stage jobs — CPU only, highest priority. Consume setup file,
  # produce the middle-stage output, delete the setup file on the way through.
  - name: "work_{i:04d}"
    command: |
      mkdir -p output/work
      cat output/setup/setup_out_{i:04d}.txt > output/work/work_out_{i:04d}.txt
      rm -f output/setup/setup_out_{i:04d}.txt
    priority: 100
    resource_requirements: "cpu_small"
    scheduler: "debug_cpu"
    input_files: ["setup_out_{i:04d}"]
    output_files: ["work_out_{i:04d}"]
    parameters:
      i: "0:999"

  # 1k postprocess jobs — CPU only, second-highest priority so finished
  # mid-stage outputs drain before new setup files are created.
  - name: "post_{i:04d}"
    command: |
      mkdir -p output/post
      cat output/work/work_out_{i:04d}.txt > output/post/post_out_{i:04d}.txt
      rm -f output/work/work_out_{i:04d}.txt
    priority: 50
    resource_requirements: "cpu_small"
    scheduler: "debug_cpu"
    input_files: ["work_out_{i:04d}"]
    output_files: ["post_out_{i:04d}"]
    parameters:
      i: "0:999"

  # Single fan-in over all 1k postprocess outputs.
  - name: "final_aggregate"
    command: |
      mkdir -p output
      count=$(ls output/post 2>/dev/null | wc -l)
      printf 'postprocess_outputs=%s\n' "$count" > output/final_report.txt
      printf 'completed_at=%s\n' "$(date -Iseconds)" >> output/final_report.txt
    priority: 0
    resource_requirements: "cpu_small"
    scheduler: "debug_cpu"
    input_file_regexes: ["^post_out_\\d+$"]
    output_files: ["final_report"]

actions:
  - trigger_type: "on_workflow_start"
    action_type: "schedule_nodes"
    scheduler: "debug_cpu"
    scheduler_type: "slurm"
    num_allocations: 1
    start_one_worker_per_node: true
