# RO-Crate Provenance Tracking Example
#
# This workflow demonstrates automatic RO-Crate metadata generation for
# tracking data provenance. When `enable_ro_crate: true` is set:
#
# - Input files (exist on disk) get File entities during initialization
# - Output files get File entities with `wasGeneratedBy` when jobs complete
# - Jobs get CreateAction entities linking to their outputs
#
# It also demonstrates software provenance tracking by registering the
# scripts used in the workflow as SoftwareApplication entities.
#
# Before running, create the input file:
#   mkdir -p data output
#   echo -e "name,value,category\nAlice,10,A\nBob,20,B\nAlice,10,A\nCharlie,,C" > data/raw_data.csv
#
# After running, export the provenance metadata:
#   torc ro-crate export <workflow_id> -o ro-crate-metadata.json
#
# Workflow structure:
#   raw_data.csv (input)
#        |
#   preprocess
#        |
#   clean_data.csv
#       / \
#  analyze  transform
#     |        |
# summary.json processed.json
#       \     /
#     generate_report
#           |
#     report.html
#
# The register_scripts job runs first and has no data dependencies, so it
# executes in parallel with the data pipeline.

name: ro_crate_demo
description: Data processing workflow with RO-Crate provenance tracking

# Enable automatic RO-Crate entity generation
enable_ro_crate: true

jobs:
  # Register the workflow scripts as SoftwareApplication entities in the
  # RO-Crate so that the provenance record includes the software used.
  - name: register_scripts
    command: bash examples/scripts/ro_crate_register_scripts.sh
    resource_requirements: small

  # Clean and validate the raw input data
  - name: preprocess
    command: python examples/scripts/ro_crate_preprocess.py '${files.input.raw_data}' '${files.output.clean_data}'
    resource_requirements: small

  # Generate summary statistics
  - name: analyze
    command: python examples/scripts/ro_crate_analyze.py '${files.input.clean_data}' '${files.output.summary}'
    resource_requirements: small

  # Transform data to JSON format
  - name: transform
    command: python examples/scripts/ro_crate_transform.py '${files.input.clean_data}' '${files.output.processed}'
    resource_requirements: small

  # Generate final HTML report
  - name: generate_report
    command: python examples/scripts/ro_crate_report.py '${files.input.summary}' '${files.output.report}'
    resource_requirements: small

# File definitions
# Torc automatically detects input vs output files:
# - If a file exists on disk when the workflow is created, it's an input file
# - If a file doesn't exist, it's an output file (will be created by a job)
files:
  # Input: raw data file (must exist before running)
  # Torc will automatically detect this file exists and record its st_mtime
  - name: raw_data
    path: data/raw_data.csv

  # Intermediate: cleaned data
  - name: clean_data
    path: data/clean_data.csv

  # Output: summary statistics
  - name: summary
    path: output/summary.json

  # Output: processed data in JSON format
  - name: processed
    path: output/processed.json

  # Output: final report
  - name: report
    path: output/report.html

# Resource requirements
resource_requirements:
  - name: small
    num_cpus: 2
    num_gpus: 0
    num_nodes: 1
    memory: 4g
    runtime: PT10M
