# RO-Crate Provenance Tracking Example
#
# This workflow demonstrates automatic RO-Crate metadata generation for
# tracking data provenance. When `enable_ro_crate: true` is set:
#
# - Input files (exist on disk) get File entities during initialization
# - Output files get File entities with `wasGeneratedBy` when jobs complete
# - Jobs get CreateAction entities linking to their outputs
#
# Before running, create the input file:
#   mkdir -p data output
#   echo -e "name,value,category\nAlice,10,A\nBob,20,B\nAlice,10,A\nCharlie,,C" > data/raw_data.csv
#
# After running, export the provenance metadata:
#   torc ro-crate export <workflow_id> -o ro-crate-metadata.json
#
# Workflow structure:
#   raw_data.csv (input)
#        |
#   preprocess
#        |
#   clean_data.csv
#       / \
#  analyze  transform
#     |        |
# summary.json processed.json
#       \     /
#     generate_report
#           |
#     report.html

name: ro_crate_demo
description: Data processing workflow with RO-Crate provenance tracking

# Enable automatic RO-Crate entity generation
enable_ro_crate: true

jobs:
  # Clean and validate the raw input data
  - name: preprocess
    command: |
      python -c "
      import csv
      with open('${files.input.raw_data}', 'r') as infile:
          reader = csv.DictReader(infile)
          rows = list(reader)
          fieldnames = reader.fieldnames
      # Remove rows with empty values and deduplicate
      seen = set()
      clean_rows = []
      for row in rows:
          if all(row.values()):  # Skip rows with empty values
              key = tuple(row.values())
              if key not in seen:
                  seen.add(key)
                  clean_rows.append(row)
      with open('${files.output.clean_data}', 'w', newline='') as outfile:
          writer = csv.DictWriter(outfile, fieldnames=fieldnames)
          writer.writeheader()
          writer.writerows(clean_rows)
      print(f'Cleaned {len(clean_rows)} rows')
      "
    resource_requirements: small

  # Generate summary statistics
  - name: analyze
    command: |
      python -c "
      import csv
      import json
      import os
      os.makedirs(os.path.dirname('${files.output.summary}'), exist_ok=True)
      with open('${files.input.clean_data}', 'r') as f:
          reader = csv.DictReader(f)
          rows = list(reader)
          columns = reader.fieldnames
      summary = {
          'row_count': len(rows),
          'columns': columns,
          'sample_row': rows[0] if rows else None
      }
      with open('${files.output.summary}', 'w') as f:
          json.dump(summary, f, indent=2)
      print('Generated summary statistics')
      "
    resource_requirements: small

  # Transform data to JSON format
  - name: transform
    command: |
      python -c "
      import csv
      import json
      import os
      os.makedirs(os.path.dirname('${files.output.processed}'), exist_ok=True)
      with open('${files.input.clean_data}', 'r') as f:
          reader = csv.DictReader(f)
          rows = list(reader)
      with open('${files.output.processed}', 'w') as f:
          json.dump(rows, f, indent=2)
      print(f'Converted {len(rows)} rows to JSON')
      "
    resource_requirements: small

  # Generate final HTML report
  - name: generate_report
    command: |
      python -c "
      import json
      import os
      os.makedirs(os.path.dirname('${files.output.report}'), exist_ok=True)
      with open('${files.input.summary}', 'r') as f:
          summary = json.load(f)
      html = f'''<!DOCTYPE html>
      <html>
      <head><title>Data Report</title></head>
      <body>
        <h1>Data Processing Report</h1>
        <p>Rows processed: {summary[\"row_count\"]}</p>
        <p>Columns: {\", \".join(summary[\"columns\"])}</p>
      </body>
      </html>'''
      with open('${files.output.report}', 'w') as f:
          f.write(html)
      print('Generated HTML report')
      "
    resource_requirements: small

# File definitions
# Torc automatically detects input vs output files:
# - If a file exists on disk when the workflow is created, it's an input file
# - If a file doesn't exist, it's an output file (will be created by a job)
files:
  # Input: raw data file (must exist before running)
  # Torc will automatically detect this file exists and record its st_mtime
  - name: raw_data
    path: data/raw_data.csv

  # Intermediate: cleaned data
  - name: clean_data
    path: data/clean_data.csv

  # Output: summary statistics
  - name: summary
    path: output/summary.json

  # Output: processed data in JSON format
  - name: processed
    path: output/processed.json

  # Output: final report
  - name: report
    path: output/report.html

# Resource requirements
resource_requirements:
  - name: small
    num_cpus: 2
    num_gpus: 0
    num_nodes: 1
    memory: 4g
    runtime: PT10M
