# Fan-In with File Regexes Example
#
# Demonstrates the input_file_regexes feature for aggregating outputs from
# many jobs into a single downstream job without listing each file explicitly.
#
# This is the recommended pattern when a fan-in job needs to consume outputs
# from a parameterized set of producers. Instead of duplicating the parameter
# space on the consumer, use a regex to match all matching file names.
#
# Key features shown:
#   - input_file_regexes for fan-in aggregation
#   - Parameterized producers with file dependencies
#   - Mixed explicit input_files and input_file_regexes
#
# Workflow structure:
#   fetch_config (produces config file)
#       |
#   simulate_region_{region}_{seed:03d} (24 jobs: 4 regions x 6 seeds)
#       |                    |
#       v                    v
#   regional_summary_{region} (4 jobs, each aggregates 6 seeds via regex)
#       |
#   global_report (aggregates all 4 regional summaries via regex)

name: fan_in_with_regexes
description: Demonstrates input_file_regexes for fan-in aggregation patterns

resource_requirements:
  - name: "minimal"
    num_cpus: 1
    num_gpus: 0
    memory: "2g"
    runtime: "PT10M"

  - name: "compute"
    num_cpus: 4
    num_gpus: 0
    memory: "16g"
    runtime: "PT1H"

files:
  - name: "config"
    path: "output/config.json"

  # Simulation output files: one per (region, seed) pair
  - name: "sim_{region}_{seed:03d}"
    path: "output/sim_{region}_{seed:03d}.csv"
    parameters:
      region: "['north','south','east','west']"
      seed: "0:5"

  # Regional summary files: one per region
  - name: "summary_{region}"
    path: "output/summary_{region}.json"
    parameters:
      region: "['north','south','east','west']"

  - name: "global_report"
    path: "output/global_report.json"

jobs:
  - name: "fetch_config"
    command: |
      #!/bin/bash
      mkdir -p output
      cat > output/config.json << 'JSON'
      {"timesteps": 1000, "dt": 0.01, "model": "stochastic_v2"}
      JSON
      echo "Config written"
    resource_requirements: "minimal"
    output_files: ["config"]

  # Parameterized simulation: 4 regions x 6 seeds = 24 jobs
  - name: "simulate_{region}_{seed:03d}"
    command: |
      #!/bin/bash
      set -e
      python3 -c "
      import json, random, csv
      random.seed({seed})
      with open('output/config.json') as f:
        cfg = json.load(f)
      results = [random.gauss(0, 1) for _ in range(cfg['timesteps'])]
      with open('output/sim_{region}_{seed:03d}.csv', 'w', newline='') as f:
        w = csv.writer(f)
        w.writerow(['timestep', 'value'])
        for i, v in enumerate(results):
          w.writerow([i, v])
      print('Wrote {seed:03d} for region {region}: {cfg[timesteps]} timesteps')
      "
    resource_requirements: "compute"
    input_files: ["config"]
    output_files: ["sim_{region}_{seed:03d}"]
    parameters:
      region: "['north','south','east','west']"
      seed: "0:5"

  # Fan-in: each regional summary aggregates all seeds for its region.
  # Uses input_file_regexes to match sim_{region}_000 through sim_{region}_005
  # without listing them explicitly.
  - name: "regional_summary_{region}"
    command: |
      #!/bin/bash
      set -e
      python3 -c "
      import csv, json, glob, numpy as np
      files = sorted(glob.glob('output/sim_{region}_*.csv'))
      all_values = []
      for f in files:
        with open(f) as fh:
          reader = csv.DictReader(fh)
          all_values.extend(float(row['value']) for row in reader)
      arr = np.array(all_values)
      summary = {
        'region': '{region}',
        'num_simulations': len(files),
        'total_samples': len(arr),
        'mean': float(arr.mean()),
        'std': float(arr.std()),
        'min': float(arr.min()),
        'max': float(arr.max()),
      }
      with open('output/summary_{region}.json', 'w') as f:
        json.dump(summary, f, indent=2)
      print(json.dumps(summary, indent=2))
      "
    resource_requirements: "minimal"
    # Fan-in via regex: matches sim_north_000, sim_north_001, ... sim_north_005
    input_file_regexes: ["^sim_{region}_\\d+$"]
    output_files: ["summary_{region}"]
    parameters:
      region: "['north','south','east','west']"

  # Global fan-in: aggregates all 4 regional summaries via regex
  - name: "global_report"
    command: |
      #!/bin/bash
      set -e
      python3 -c "
      import json, glob
      summaries = []
      for f in sorted(glob.glob('output/summary_*.json')):
        with open(f) as fh:
          summaries.append(json.load(fh))
      report = {
        'regions': {s['region']: s for s in summaries},
        'global_mean': sum(s['mean'] for s in summaries) / len(summaries),
        'total_simulations': sum(s['num_simulations'] for s in summaries),
      }
      with open('output/global_report.json', 'w') as f:
        json.dump(report, f, indent=2)
      print(json.dumps(report, indent=2))
      "
    resource_requirements: "minimal"
    # Fan-in via regex: matches summary_north, summary_south, etc.
    input_file_regexes: ["^summary_\\w+$"]
    output_files: ["global_report"]
